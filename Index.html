<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
      <img id="suelo" src="suelos.jpg">
      <img id="paredes" src="paredes.jpg">
      <img id="vigas" src="vigas.jpg">
      </a-assets>
      <a-entity>
      <a-box position="0 0.1 0" color="#9a9898" depth="3" height="0.2" width="3" rotation="0 0 0" src="#suelo"></a-box>
      <a-box position="0 1.7 -1.4" color="#e9d8d9" depth="3" height="0.2" width="3" rotation="0 90 90" src="#paredes"></a-box>
      <a-box position="1.4 1.7 0" color="#e4bebe" depth="3" height="0.2" width="3" rotation="0 0 90" src="#paredes"></a-box>
      <a-box position="-0.5 0.45 0.5" color="#d41620" depth="0.5" height="0.5" width="0.5" rotation="0 45 0" src="#vigas"></a-box>
      <a-box position="0 3.3 0" color="#9a9898" depth="3" height="0.2" width="3" rotation="0 0 0" ></a-box>
      <a-sphere position="0.5 0.7 0.75" radius="0.5" color="#3278c3"></a-sphere>
      <a-cylinder position="-0.2 1.2 -0.25" radius="0.25" height="2" color="#FFC65D"></a-cylinder>
      <a-cone position="1 0.8 -0.5" color="#7BC8A4" radius-bottom="0.5" radius-top="0" height="1"></a-cone>
      <a-sky position="0 1 0"color="#ECECEC"></a-sky>
      <a-entity position="3 3 3" light="type: ambient; color:#FFFFFF"></a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
